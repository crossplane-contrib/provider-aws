apiVersion: elbv2.aws.crossplane.io/v1alpha1
kind: Rule
metadata:
  name: rule-test
spec:
  providerConfigRef:
    name: providerconfig-aws
  forProvider:
    actions:
    - type_: forward
      targetGroupARN: 'arn:aws:elasticloadbalancing:us-east-1:85214683:targetgroup/elbv2-crossplane-test/2024c4ffdf606bd3'
    conditions:
      - field: path-pattern
        pathPatternConfig:
          values:
            - /static/test/*
      - field: host-header
        hostHeaderConfig:
          values:
            - example.com
    listenerARN: 'arn:aws:elasticloadbalancing:us-east-1:85214683:listener/app/elbv2-rule-test/d6f12cb33de0501e/36d821d1dbb8b6c6'
    priority: 100
    region: us-east-1
---
apiVersion: elbv2.aws.crossplane.io/v1alpha1
kind: Rule
metadata:
  name: rule-sample
spec:
  providerConfigRef:
    name: providerconfig-aws
  forProvider:
    actions:
    - type_: forward
      forwardConfig:
        targetGroups:
          - targetGroupARN: 'arn:aws:elasticloadbalancing:us-east-1:85214683:targetgroup/elbv2-crossplane-test/2024c4ffdf606bd3'
    conditions:
      - field: path-pattern
        pathPatternConfig:
          values:
            - /static/*
    listenerARN: 'arn:aws:elasticloadbalancing:us-east-1:85214683:listener/app/elbv2-rule-test/d6f12cb33de0501e/36d821d1dbb8b6c6'
    priority: 101
    region: us-east-1